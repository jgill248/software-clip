services:
  softclip:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${SOFTCLIP_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      SOFTCLIP_HOME: "/softclip"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      SOFTCLIP_DEPLOYMENT_MODE: "authenticated"
      SOFTCLIP_DEPLOYMENT_EXPOSURE: "private"
      SOFTCLIP_PUBLIC_URL: "${SOFTCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${SOFTCLIP_DATA_DIR:-../data/docker-softclip}:/softclip"
