services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: softclip
      POSTGRES_PASSWORD: softclip
      POSTGRES_DB: softclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U softclip -d softclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://softclip:softclip@db:5432/softclip
      PORT: "3100"
      SERVE_UI: "true"
      SOFTCLIP_DEPLOYMENT_MODE: "authenticated"
      SOFTCLIP_DEPLOYMENT_EXPOSURE: "private"
      SOFTCLIP_PUBLIC_URL: "${SOFTCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - softclip-data:/softclip
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  softclip-data:
